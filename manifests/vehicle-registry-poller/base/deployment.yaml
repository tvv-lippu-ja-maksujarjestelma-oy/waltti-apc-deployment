apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-registry-poller
  labels:
    app.kubernetes.io/name: vehicle-registry-poller
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
     #app: vehicle-registry-poller
  template:
    metadata:
      labels:
        networkPolicy: client-only
        podDisruptionBudget: max-unavailable-one
        #app.kubernetes.io/name: vehicle-registry-poller
        #app.kubernetes.io/instance: vehicle-registry-poller-fi-kuopio
    spec:
      containers:
        - name: vehicle-registry-poller
          image: tvvlmj/http-pulsar-poller:edge
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 100Mi
          envFrom:
            - configMapRef:
                name: vehicle-registry-poller
          volumeMounts:
            - name: vehicle-registry-poller
              mountPath: "/secrets"
              readOnly: true
          ports:
            - name: liveness-port
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: liveness-port
            timeoutSeconds: 5
            failureThreshold: 3
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: liveness-port
            timeoutSeconds: 5
            failureThreshold: 90
            periodSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
      volumes:
        - name: vehicle-registry-poller
          secret:
            secretName: vehicle-registry-poller

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vehicle-position-splitter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vehicle-position-splitter
  template:
    metadata:
      labels:
        app: vehicle-position-splitter
        networkPolicy: client-only
        podDisruptionBudget: max-unavailable-one
        app.kubernetes.io/name: vehicle-position-splitter
    spec:
      containers:
        - name: vehicle-position-splitter
          image: tvvlmj/waltti-apc-vehicle-position-splitter:8b9f458ca6604b52134f6897b4468c301dc64164520d9d9ff11f32b1c9e0486b
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 100Mi
          envFrom:
            - configMapRef:
                name: vehicle-position-splitter
          ports:
            - name: liveness-port
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: liveness-port
            timeoutSeconds: 5
            failureThreshold: 3
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /healthz
              port: liveness-port
            timeoutSeconds: 5
            failureThreshold: 90
            periodSeconds: 2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001

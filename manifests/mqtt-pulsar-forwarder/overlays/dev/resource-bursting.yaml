apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-pulsar-forwarder
spec:
  template:
    spec:
      containers:
        - name: mqtt-pulsar-forwarder
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
              ephemeral-storage: 100Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 100Mi

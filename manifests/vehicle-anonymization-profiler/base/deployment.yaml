apiVersion: batch/v1
kind: CronJob
metadata:
  name: vehicle-anonymization-profiler
spec:
  schedule: "7 2/6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: vehicle-anonymization-profiler
              image: tvvlmj/waltti-apc-vehicle-anonymization-profiler:edge
              imagePullPolicy: Always
              resources:
                requests:
                  cpu: "2"
                  memory: 4Gi
                  ephemeral-storage: 2Gi
                limits:
                  cpu: "8"
                  memory: 8Gi
                  ephemeral-storage: 2Gi
              envFrom:
                - configMapRef:
                    name: vehicle-anonymization-profiler
              ports:
                - name: liveness-port
                  containerPort: 8080
              livenessProbe:
                httpGet:
                  path: /healthz
                  port: liveness-port
                timeoutSeconds: 5
                failureThreshold: 3
                periodSeconds: 10
              startupProbe:
                httpGet:
                  path: /healthz
                  port: liveness-port
                timeoutSeconds: 5
                failureThreshold: 90
                periodSeconds: 2
                initialDelaySeconds: 5
              securityContext:
                allowPrivilegeEscalation: true

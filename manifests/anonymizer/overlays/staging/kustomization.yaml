namespace: staging
resources:
  - ../../base

configMapGenerator:
  - name: anonymizer
    behavior: merge
    literals:
      - "PINO_LOG_LEVEL=info"
      - "PULSAR_APC_CONSUMER_TOPICS_PATTERN=persistent://apc-staging/aggregated/aggregated-apc-journey"
      - "PULSAR_PRODUCER_TOPIC=persistent://apc-staging/anonymized/anonymized-apc-journey"
      - "PULSAR_PROFILE_READER_TOPIC=persistent://apc-staging/profiles/vehicle-anonymization-profiles"
      # - "PULSAR_OAUTH2_AUDIENCE=urn:sn:pulsar:waltti:beta"
      - "PULSAR_SERVICE_URL=pulsar://pulsar-broker.pulsar.svc.cluster.local:6650"
      # Skip initial profile reading - will pick up profiles from keepUpdatingProfiles loop
      - "IS_INITIAL_PROFILE_READING_REQUIRED=false"
      # Dynamic ACCEPTED_DEVICE_MAP from vehicle catalogue topics
      - "PULSAR_VEHICLE_REGISTRY_CONSUMER_TOPICS_PATTERN=persistent://apc-staging/source/vehicle-catalogue-.*"
      - "PULSAR_VEHICLE_REGISTRY_SUBSCRIPTION=anonymizer-vehicle-registry-staging"

patches:
  - path: history-limit.yaml
  - path: resource-bursting.yaml
